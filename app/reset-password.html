        document.documentElement.classList.add('dark');
        document.documentElement.classList.remove('light');
    } else {
        document.documentElement.classList.remove('dark');
        document.documentElement.classList.add('light');
    }
</script>

<p class="text-on-surface-variant dark:text-outline-variant">Please choose a strong new password.</p>
</div>
<!-- Form -->
<form class="space-y-lg" onsubmit="return false;">
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant dark:text-outline-variant" for="new-password">New Password</label>
<input class="w-full px-lg py-md bg-surface-container-low dark:bg-[#131130] border border-outline-variant dark:border-white/20 focus:border-primary focus:ring-1 focus:ring-primary rounded-lg transition-all outline-none text-on-surface dark:text-white" id="new-password" placeholder="••••••••" type="password" required minlength="8"/>
</div>
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant dark:text-outline-variant" for="confirm-password">Confirm Password</label>
<input class="w-full px-lg py-md bg-surface-container-low dark:bg-[#131130] border border-outline-variant dark:border-white/20 focus:border-primary focus:ring-1 focus:ring-primary rounded-lg transition-all outline-none text-on-surface dark:text-white" id="confirm-password" placeholder="••••••••" type="password" required minlength="8"/>
</div>
<button class="w-full py-md bg-primary hover:bg-primary-container text-white font-card-title text-card-title rounded-lg shadow-lg hover:shadow-xl transition-all active:scale-[0.98] mt-lg flex items-center justify-center gap-2" id="reset-btn" type="submit">
    <span>Reset Password</span>
</button>
</form>

<!-- Theme Toggle Floating Action -->
<button class="fixed bottom-lg right-lg h-12 w-12 rounded-full bg-surface-container-highest dark:bg-[#1f1b4c] shadow-xl flex items-center justify-center text-primary dark:text-[#adc9eb] transition-all hover:scale-110 active:scale-95 z-50" onclick="toggleTheme()">
<span class="material-symbols-outlined" id="theme-icon">dark_mode</span>
</button>
<script>
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                html.classList.add('light');
                if (icon) icon.textContent = 'dark_mode';
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                html.classList.remove('light');
                if (icon) icon.textContent = 'light_mode';
                localStorage.setItem('theme', 'dark');
            }
        }

        // Sync initial toggle icon
        (function() {
            const icon = document.getElementById('theme-icon');
            if (document.documentElement.classList.contains('dark')) {
                if (icon) icon.textContent = 'light_mode';
            } else {
                if (icon) icon.textContent = 'dark_mode';
            }
        })();

        // Form submission logic
        document.getElementById('reset-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            const password = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;

            if (!password || !confirm) {
                alert('Please fill out all fields.');
                return;
            }

            if (password !== confirm) {
                alert('Passwords do not match.');
                return;
            }

            if (password.length < 8) {
                alert('Password must be at least 8 characters long.');
                return;
            }

            const btn = document.getElementById('reset-btn');
            btn.disabled = true;
            btn.innerHTML = `<span class="animate-spin material-symbols-outlined mr-2">progress_activity</span>Updating...`;

            try {
                await window.FinSenseAuth.updatePassword(password);
                alert('Your password has been reset successfully! Redirecting you to login...');
                window.location.href = 'login.html';
            } catch (err) {
                alert(err.message || "Failed to reset password. The link may have expired.");
                btn.disabled = false;
                btn.innerHTML = 'Reset Password';
            }
        });
</script>
